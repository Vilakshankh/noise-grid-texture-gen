<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noise Grid Texture Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <nav class="tool-nav">
      <a href="index.html" class="active">Texture Generator</a>
      <a href="threshold.html">Threshold Mask</a>
    </nav>
    <header class="app-header">
      <h1>Noise Grid Texture Generator</h1>
      <p>A grid pattern masked by a procedural noise field. Tune it, then export as PNG.</p>
    </header>

    <div class="layout">
      <section class="canvas-panel">
        <div class="canvas-viewport">
          <canvas id="canvas" width="680" height="400"></canvas>
        </div>
        <p class="canvas-dimensions" id="canvas-dimensions">680 x 400</p>
        <div class="canvas-actions">
          <button id="regenerate" type="button">Regenerate seed</button>
          <button id="export-svg" type="button">Export SVG</button>
          <button id="export" type="button" class="primary">Export PNG</button>
        </div>
      </section>

      <aside class="controls">
        <div class="control">
          <label for="pattern">Pattern</label>
          <select id="pattern">
            <option value="lines" selected>Grid lines</option>
            <option value="squares">Squares</option>
          </select>
        </div>

        <div class="control">
          <label for="algorithm">Map source</label>
          <select id="algorithm">
            <option value="perlin" selected>Perlin noise</option>
            <option value="simplex">Simplex noise</option>
            <option value="fbm">fBm (5 octaves)</option>
            <option value="cellular">Cellular (Worley)</option>
            <option value="image">Image (upload below)</option>
          </select>
        </div>

        <div class="control" id="image-control">
          <label for="image-file">Import image</label>
          <input type="file" id="image-file" accept="image/*" />
        </div>

        <div class="control">
          <label for="canvas-size">Canvas size</label>
          <select id="canvas-size">
            <option value="680x400" selected>Landscape 680x400</option>
            <option value="1280x720">Wide 1280x720 (16:9)</option>
            <option value="600x600">Square 600x600</option>
            <option value="400x680">Portrait 400x680</option>
            <option value="original">Original image size</option>
            <option value="custom">Custom...</option>
          </select>
        </div>

        <div class="control hidden" id="custom-size-control">
          <label>Custom dimensions</label>
          <div class="dimension-inputs">
            <input type="number" id="custom-width" min="16" max="4000" step="1" value="680" aria-label="Width" />
            <span class="dimension-x">x</span>
            <input type="number" id="custom-height" min="16" max="4000" step="1" value="400" aria-label="Height" />
          </div>
        </div>

        <div class="control" id="scale-control">
          <label for="scale">Noise scale <output id="scale-value">120</output></label>
          <input type="range" id="scale" min="10" max="300" step="1" value="120" />
        </div>

        <div class="control">
          <label for="intensity">Noise intensity <output id="intensity-value">1.5</output></label>
          <input type="range" id="intensity" min="0.2" max="4" step="0.1" value="1.5" />
        </div>

        <div class="control">
          <label for="grid-size">Grid size <output id="grid-size-value">24px</output></label>
          <input type="range" id="grid-size" min="10" max="120" step="1" value="24" />
        </div>

        <div class="control hidden" id="gap-control">
          <label for="gap">Square gap <output id="gap-value">4px</output></label>
          <input type="range" id="gap" min="0" max="30" step="1" value="4" />
        </div>

        <div class="control">
          <label for="opacity">Grid opacity <output id="opacity-value">1.0</output></label>
          <input type="range" id="opacity" min="0" max="1" step="0.05" value="1" />
        </div>

        <div class="control">
          <label>Grid color</label>
          <div class="color-options" id="color-options">
            <button type="button" class="swatch selected" data-color="white" aria-label="White">
              <span style="background:#f5f5f5"></span> White
            </button>
            <button type="button" class="swatch" data-color="black" aria-label="Black">
              <span style="background:#111111"></span> Black
            </button>
            <button type="button" class="swatch" data-color="blue" aria-label="Blue">
              <span style="background:#7da7ff"></span> Blue
            </button>
          </div>
          <input type="text" id="hex" class="hex-input" placeholder="Custom hex, e.g. #ff6b35" spellcheck="false" />
        </div>
      </aside>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
